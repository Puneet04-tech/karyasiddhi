services:
  - type: web
    name: karyasiddhi-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: http://localhost:5173,https://karyasiddhi.netlify.app
      - key: AI_SERVICE_URL
        value: https://karyasiddhi-ai.onrender.com

  - type: web
    name: karyasiddhi-ai
    env: python
    region: oregon
    plan: free
    pythonVersion: 3.11
    buildCommand: pip install -r ai-service/requirements.txt
    startCommand: cd ai-service && python main.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10001
